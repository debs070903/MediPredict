server:
  port: 8080

spring:
  application:
    name: MediPredict Backend
  datasource:
    url: ${NEON_URL}
    username: ${NEON_USERNAME}
    password: ${NEON_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: false
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: teammedipredict@gmail.com
    password: ${MAIL_APP_PASSWORD}

    properties:
     mail:
       smtp:
         auth: true
         starttls:
           enable: true
management:
  endpoints:
    web:
      exposure:
        include: health,info

medipredict:
  frontend-url: http://localhost:3000
  ml-service-base-url: ${ML_SERVICE_URL}
  application-name: MediPredict Backend
  currency: INR
  session-ttl-hours: 24
  allowed-origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
